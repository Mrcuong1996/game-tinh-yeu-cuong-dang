<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE 💖</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:linear-gradient(135deg,#ffd6e7,#fff0f5);
  font-family:sans-serif;
  position:relative;
}

/* TEXT */
h1{
  text-align:center;
  color:#ff2e63;
  font-size:2.2rem;
  z-index:10;
}

.buttons{
  margin-top:20px;
  z-index:10;
}

button{
  padding:14px 28px;
  border:none;
  border-radius:12px;
  font-size:1.1rem;
  margin:10px;
}

#yes{background:#ff2e63;color:white;}
#no{background:#333;color:white;position:absolute;}

#message{
  display:none;
  margin-top:20px;
  font-size:2rem;
  color:#6f42c1;
  z-index:10;
  text-align:center;
}

/* ================= TIM ================= */

.heart{
  position:absolute;
  width:120px;
  height:120px;
  background:#ff2d55;
  transform:rotate(-45deg);
  animation:float 10s linear forwards;
  overflow:hidden;
}

/* 2 nửa tim */
.heart::before,
.heart::after{
  content:"";
  position:absolute;
  width:120px;
  height:120px;
  background:#ff2d55;
  border-radius:50%;
}

.heart::before{top:-60px;left:0;}
.heart::after{left:60px;top:0;}

/* MEDIA TRONG TIM (QUAN TRỌNG) */
.heart img,
.heart video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;

  /* QUAN TRỌNG: mask hình trái tim */
  -webkit-mask-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'><path d='M50 90 L15 55 C5 40 10 20 30 20 C40 20 45 25 50 30 C55 25 60 20 70 20 C90 20 95 40 85 55 Z' fill='black'/></svg>");
  
  mask-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'><path d='M50 90 L15 55 C5 40 10 20 30 20 C40 20 45 25 50 30 C55 25 60 20 70 20 C90 20 95 40 85 55 Z' fill='black'/></svg>");

  -webkit-mask-repeat:no-repeat;
  mask-repeat:no-repeat;

  -webkit-mask-size:100% 100%;
  mask-size:100% 100%;
}

/* ================= TIM MƯA NHỎ ================= */

.rain-heart{
  position:absolute;
  top:-20px;
  width:14px;
  height:14px;
  background:#ff69b4;
  transform:rotate(45deg);
  opacity:0.8;
  animation:fall 6s linear forwards;
}

.rain-heart::before,
.rain-heart::after{
  content:"";
  position:absolute;
  width:14px;
  height:14px;
  background:#ff69b4;
  border-radius:50%;
}

.rain-heart::before{top:-7px;left:0;}
.rain-heart::after{left:7px;top:0;}

@keyframes fall{
  0%{transform:translateY(0) rotate(45deg);opacity:1;}
  100%{transform:translateY(120vh) rotate(45deg);opacity:0;}
}

/* TIM BAY */
@keyframes float{
  0%{
    transform:translateY(0) rotate(-45deg) scale(.5);
    opacity:0;
  }
  10%{opacity:1;}
  100%{
    transform:translateY(-120vh) rotate(-45deg) scale(1.2);
    opacity:0;
  }
}

audio{display:none;}

</style>
</head>

<body>

<h1>
ANH HỎI THẬT LÒNG 🥺<br>
EM CÓ YÊU ANH KHÔNG?
</h1>

<div class="buttons">
  <button id="yes">CÓ Ạ 🥰</button>
  <button id="no">Không 😤</button>
</div>

<div id="message">
  Anh biết ngay mà 💖<br>
  YÊU EM NHIỀU LẮM
</div>

<audio id="music" loop>
  <source src="song.mp3">
</audio>

<script>

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const message = document.getElementById("message");
const music = document.getElementById("music");

const images = ["1.jpg","2.jpg","3.jpg","4.jpg"];
const videos = ["1.mp4","2.mp4","3.mp4","4.mp4"];

/* NÚT KHÔNG CHẠY */
noBtn.addEventListener("mouseover", () => {
  noBtn.style.left = Math.random()*80 + "vw";
  noBtn.style.top = Math.random()*80 + "vh";
});

/* NHẤN CÓ */
yesBtn.addEventListener("click", () => {
  message.style.display = "block";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";

  music.play();

  createHearts();
  rainHearts();
});

/* TIM LỚN BAY */
function createHearts(){

  setInterval(() => {

    const heart = document.createElement("div");
    heart.classList.add("heart");

    heart.style.left = Math.random()*100 + "vw";
    heart.style.bottom = "-120px";

    const isVideo = Math.random() > 0.5;

    if(isVideo){
      const video = document.createElement("video");
      video.src = videos[Math.floor(Math.random()*videos.length)];
      video.autoplay = true;
      video.loop = true;
      video.muted = true;
      video.playsInline = true;
      heart.appendChild(video);
    } else {
      const img = document.createElement("img");
      img.src = images[Math.floor(Math.random()*images.length)];
      heart.appendChild(img);
    }

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 10000);

  }, 700);
}

/* TIM MƯA NHỎ */
function rainHearts(){

  setInterval(() => {

    const h = document.createElement("div");
    h.classList.add("rain-heart");

    h.style.left = Math.random()*100 + "vw";

    document.body.appendChild(h);

    setTimeout(() => h.remove(), 6000);

  }, 200);

}

</script>

</body>
</html>
