<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE 💖</title>

<style>

body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:linear-gradient(135deg,#ffd6e7,#fff0f5);
  font-family:sans-serif;
}

h1{
  text-align:center;
  color:#ff2e63;
  margin-top:20px;
}

button{
  padding:12px 24px;
  margin:10px;
  border:none;
  border-radius:10px;
}

#yes{background:#ff2e63;color:white;}
#no{background:#333;color:white;position:absolute;}

#message{
  display:none;
  text-align:center;
  font-size:24px;
  color:#6f42c1;
}

/* TIM */
.heart{
  position:absolute;
  width:140px;
  height:140px;
  animation:float 10s linear forwards;
}

@keyframes float{
  0%{transform:translateY(0);opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(-120vh);opacity:0;}
}

/* TIM NHỎ */
.rain{
  position:absolute;
  width:12px;
  height:12px;
  background:#ff69b4;
  clip-path:path("M6 0 C2 0,0 2,0 6 C0 10,6 12,6 12 C6 12,12 10,12 6 C12 2,10 0,6 0 Z");
  animation:fall 6s linear forwards;
}

@keyframes fall{
  0%{transform:translateY(0);}
  100%{transform:translateY(120vh);}
}

</style>
</head>

<body>

<h1>ANH HỎI THẬT LÒNG 🥺 EM CÓ YÊU ANH KHÔNG?</h1>

<div style="text-align:center;">
  <button id="yes">CÓ Ạ 🥰</button>
  <button id="no">Không 😤</button>
</div>

<div id="message">YÊU EM NHIỀU LẮM 💖</div>

<audio id="music" loop>
  <source src="song.mp3">
</audio>

<script>

const yes = document.getElementById("yes");
const no = document.getElementById("no");
const msg = document.getElementById("message");
const music = document.getElementById("music");

const images = ["1.jpg","2.jpg","3.jpg","4.jpg"];
const videos = ["1.mp4","2.mp4","3.mp4","4.mp4"];

/* nút chạy */
no.onmouseover = () => {
  no.style.left = Math.random()*80 + "vw";
  no.style.top = Math.random()*80 + "vh";
};

/* bấm yes */
yes.onclick = () => {
  msg.style.display = "block";
  yes.style.display = "none";
  no.style.display = "none";

  music.play();

  setInterval(createHeart, 600);
  setInterval(rainHeart, 200);
};

/* SVG TIM CHUẨN */
function createHeart(){

  const div = document.createElement("div");
  div.className = "heart";
  div.style.left = Math.random()*100 + "vw";
  div.style.bottom = "-150px";

  const isVideo = Math.random() > 0.5;

  div.innerHTML = `
  <svg viewBox="0 0 200 200" width="140" height="140">
    <defs>
      <clipPath id="clip">
        <path d="M100 180 C20 120, 0 60, 50 30 C80 10,100 40,100 40 C100 40,120 10,150 30 C200 60,180 120,100 180 Z"/>
      </clipPath>
    </defs>

    ${
      isVideo
      ? `<foreignObject width="200" height="200" clip-path="url(#clip)">
          <video src="${videos[Math.floor(Math.random()*videos.length)]}"
          autoplay loop muted playsinline
          style="width:100%;height:100%;object-fit:cover;"></video>
        </foreignObject>`
      : `<foreignObject width="200" height="200" clip-path="url(#clip)">
          <img src="${images[Math.floor(Math.random()*images.length)]}"
          style="width:100%;height:100%;object-fit:cover;">
        </foreignObject>`
    }

  </svg>
  `;

  document.body.appendChild(div);

  setTimeout(()=>div.remove(),10000);
}

/* mưa tim */
function rainHeart(){

  const r = document.createElement("div");
  r.className = "rain";
  r.style.left = Math.random()*100 + "vw";
  document.body.appendChild(r);

  setTimeout(()=>r.remove(),6000);
}

</script>

</body>
</html>
