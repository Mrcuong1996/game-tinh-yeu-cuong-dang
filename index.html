<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE 💖</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffd6e7,#fff0f5);
  font-family:Segoe UI,sans-serif;
  position:relative;
}

h1{
  text-align:center;
  color:#ff2e63;
  font-size:2.3rem;
  z-index:10;
}

.buttons{
  margin-top:20px;
  z-index:10;
}

button{
  padding:14px 28px;
  border:none;
  border-radius:12px;
  font-size:1.1rem;
  margin:10px;
  cursor:pointer;
}

#yes{
  background:#ff2e63;
  color:white;
}

#no{
  background:#333;
  color:white;
  position:absolute;
}

#message{
  display:none;
  margin-top:25px;
  font-size:2rem;
  color:#6f42c1;
  text-align:center;
  z-index:10;
}

/* TIM */
.heart{
  position:absolute;
  width:130px;
  height:130px;
  background:red;
  transform:rotate(-45deg);
  animation:float 10s linear forwards;
  overflow:hidden;
  box-shadow:0 0 25px rgba(255,0,100,0.6);
}

.heart::before,
.heart::after{
  content:"";
  position:absolute;
  width:130px;
  height:130px;
  background:red;
  border-radius:50%;
}

.heart::before{ top:-65px; left:0; }
.heart::after{ left:65px; top:0; }

/* ẢNH + VIDEO */
.heart img,
.heart video{
  position:absolute;
  width:90%;
  height:90%;
  top:5%;
  left:5%;
  object-fit:cover;
  border-radius:50%;
  transform:rotate(45deg);
  border:4px solid white;
  background:white;
}

/* BAY */
@keyframes float{
  0%{
    transform:translateY(0) rotate(-45deg) scale(.6);
    opacity:0;
  }
  10%{
    opacity:1;
  }
  100%{
    transform:translateY(-120vh) rotate(-45deg) scale(1.2);
    opacity:0;
  }
}

audio{
  display:none;
}

</style>
</head>

<body>

<h1>
ANH HỎI THẬT LÒNG 🥺<br>
EM CÓ YÊU ANH KHÔNG?
</h1>

<div class="buttons">
  <button id="yes">CÓ Ạ 🥰</button>
  <button id="no">Không 😤</button>
</div>

<div id="message">
  Anh biết ngay mà 💖<br>
  YÊU EM NHIỀU LẮM
</div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const message = document.getElementById("message");
const music = document.getElementById("music");

const images = ["1.jpg","2.jpg","3.jpg","4.jpg"];
const videos = ["1.mp4","2.mp4","3.mp4","4.mp4"];

const noTexts = [
  "Không 😤",
  "Không 😒",
  "Em còn học 😑",
  "K anh 😏",
  "Đéo 😑",
  "Phiền vl 😠"
];

let count = 0;

/* NÚT KHÔNG */
noBtn.addEventListener("mouseover", () => {

  noBtn.style.left = Math.random() * (window.innerWidth - 120) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 60) + "px";

  if(count < noTexts.length){
    noBtn.innerText = noTexts[count];
    count++;
  }

});

/* NHẤN CÓ */
yesBtn.addEventListener("click", () => {

  message.style.display = "block";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";

  music.play();
  createHearts();

});

/* TIM BAY */
function createHearts(){

  setInterval(() => {

    const heart = document.createElement("div");
    heart.classList.add("heart");

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.bottom = "-150px";

    const isVideo = Math.random() > 0.5;

    if(isVideo){

      const video = document.createElement("video");
      video.src = videos[Math.floor(Math.random() * videos.length)];
      video.autoplay = true;
      video.loop = true;
      video.muted = true;
      video.volume = 0;
      video.playsInline = true;

      heart.appendChild(video);

    } else {

      const img = document.createElement("img");
      img.src = images[Math.floor(Math.random() * images.length)];

      heart.appendChild(img);
    }

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 10000);

  }, 600); /* chạy chậm hơn */

}

</script>

</body>
</html>
